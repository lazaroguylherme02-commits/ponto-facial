<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Eletrônico - ebdi</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        :root {
            --ebdi-blue: #003153;
            --ebdi-lightblue: #1BA0CD;
            --ebdi-cyan: #00E4FF;
            --ebdi-gold: #D3B574;
            --ebdi-white: #FFFFFF;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--ebdi-blue); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: var(--ebdi-white);
        }

        .container { 
            background: rgba(0, 0, 0, 0.25); 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            text-align: center; 
            width: 95%; 
            max-width: 800px; 
            border-top: 5px solid var(--ebdi-cyan);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .logo-ebdi {
            max-width: 200px; 
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .status { 
            color: var(--ebdi-gold); 
            margin-bottom: 25px; 
            font-weight: 600; 
            font-size: 1.2rem;
        }

        .video-container { 
            position: relative; 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000;
            border: 4px solid var(--ebdi-lightblue);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        video { width: 100%; display: block; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        
        .log-container { 
            margin-top: 30px; 
            max-height: 180px; 
            overflow-y: auto; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            padding-top: 15px; 
            text-align: left; 
            font-size: 15px; 
        }

        .log-item { 
            padding: 10px 0; 
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1); 
        }

        .entrada { color: #4ade80; } 
        .saida { color: #facc15; } 

        .success-banner {
            position: absolute;
            top: -20px; 
            left: 50%;
            transform: translateX(-50%);
            background-color: #15803d; 
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            width: 85%;
            border: 2px solid #22c55e;
        }

        .success-banner.show {
            top: 40px;
            opacity: 1;
            visibility: visible;
        }

        .success-banner .b-nome { font-size: 1.5rem; font-weight: 700; margin: 5px 0; display: block; }
        .success-banner .b-data { font-size: 0.95rem; font-weight: 400; opacity: 0.9; }

    </style>
</head>
<body>

<div id="successBanner" class="success-banner">
    <span id="bannerTipo">✅ Entrada Registrada!</span>
    <span class="b-nome" id="bannerNome">Nome</span>
    <span class="b-data" id="bannerData">00/00/0000 às 00:00:00</span>
</div>

<div class="container">
    <img src="./logo.png" alt="Logo EBDI" class="logo-ebdi" onerror="this.style.display='none'">
    
    <div class="status" id="statusLabel">Carregando inteligência artificial...</div>
    
    <div class="video-container">
        <video id="video" autoplay muted playsinline></video>
    </div>
    
    <div class="log-container" id="logContainer">
        <strong>Últimos Registros da Unidade:</strong>
    </div>
</div>

<script>
    window.onload = async function() {
        const video = document.getElementById('video');
        const statusLabel = document.getElementById('statusLabel');
        const logContainer = document.getElementById('logContainer');
        const successBanner = document.getElementById('successBanner');

        const modelUrl = 'https://justadudewhohacks.github.io/face-api.js/models';

        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl),
                faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl),
                faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl),
                faceapi.nets.ssdMobilenetv1.loadFromUri(modelUrl)
            ]);
            statusLabel.innerText = "Sincronizando fotos dos colaboradores...";
            
            // Seu nome exatamente como está no arquivo (tudo minúsculo)
            const labels = ['lazaroguylherme']; 
            
            const labeledFaceDescriptors = await Promise.all(
                labels.map(async label => {
                    // CORREÇÃO: Agora puxando o arquivo com apenas UM .jpg
                    const imgUrl = `./${label}.jpg`; 
                    
                    try {
                        const img = await faceapi.fetchImage(imgUrl);
                        const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if (!detections) throw new Error(`Rosto não identificado na foto de ${label}. Troque por uma foto mais nítida.`);
                        return new faceapi.LabeledFaceDescriptors(label, [detections.descriptor]);
                    } catch (e) {
                        throw new Error(`Não foi possível baixar a foto exata. Falha no arquivo ${imgUrl}.`);
                    }
                })
            );

            const faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
            startVideo(faceMatcher);

        } catch (err) {
            statusLabel.innerText = err.message;
            statusLabel.style.color = "#ef4444";
            console.error(err);
        }

        function startVideo(faceMatcher) {
            statusLabel.innerText = "Ligando a câmera...";
            statusLabel.style.color = "var(--ebdi-gold)";
            
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    statusLabel.innerText = "Posicione o rosto em frente ao tablet";
                    statusLabel.style.color = "var(--ebdi-cyan)";
                })
                .catch(err => {
                    statusLabel.innerText = "Permita a câmera no navegador!";
                    statusLabel.style.color = "#ef4444";
                });

            let pondoEmEspera = false;

            video.addEventListener('play', () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                document.querySelector('.video-container').append(canvas);
                const displaySize = { width: video.clientWidth, height: video.clientHeight };
                faceapi.matchDimensions(canvas, displaySize);

                setInterval(async () => {
                    if (pondoEmEspera) return; 

                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);
                    
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                    faceapi.draw.drawDetections(canvas, resizedDetections);

                    if (detections.length > 0) {
                        const results = resizedDetections.map(d => faceMatcher.findBestMatch(d.descriptor));
                        
                        results.forEach((result) => {
                            const nomeReconhecido = result.label;
                            
                            if (nomeReconhecido !== 'unknown') {
                                registrarPonto(nomeReconhecido);
                                pondoEmEspera = true;
                                setTimeout(() => { pondoEmEspera = false; }, 8000); 
                            }
                        });
                    }
                }, 1000);
            });
        }

        function registrarPonto(nome) {
            const agora = new Date();
            const dataHoje = agora.toLocaleDateString('pt-BR'); 
            const horaFormatada = agora.toLocaleTimeString('pt-BR');
            
            const chaveRegistro = `ponto_${nome}_${dataHoje}`;
            const registroHoje = localStorage.getItem(chaveRegistro);
            let tipoPonto = "";

            if (!registroHoje) {
                tipoPonto = "Entrada";
                localStorage.setItem(chaveRegistro, 'entrada_registrada'); 
            } else {
                tipoPonto = "Saída";
            }
            
            document.getElementById('bannerTipo').innerHTML = tipoPonto === "Entrada" ? "✅ Entrada Registrada!" : "👋 Saída Registrada!";
            
            // Formatando o nome para aparecer bonitinho na tela (ex: Lázaro Guylherme em vez de lazaroguylherme)
            let nomeExibicao = nome;
            if (nome === 'lazaroguylherme') nomeExibicao = 'Lázaro Guylherme';
            
            document.getElementById('bannerNome').innerText = nomeExibicao;
            document.getElementById('bannerData').innerText = `${dataHoje} às ${horaFormatada}`;
            
            const banner = document.getElementById('successBanner');
            banner.classList.add('show');
            statusLabel.style.opacity = '0'; 

            const item = document.createElement('div');
            item.classList.add('log-item');
            const classeCor = tipoPonto === "Entrada" ? "entrada" : "saida";
            item.innerHTML = `<span class="${classeCor}"><strong>[${tipoPonto}] ${nomeExibicao}</strong> - ${horaFormatada}</span>`;
            logContainer.insertBefore(item, logContainer.firstChild);

            setTimeout(() => {
                banner.classList.remove('show');
                statusLabel.style.opacity = '1';
            }, 4500);
        }
    };
</script>
</body>
</html>
