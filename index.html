<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ponto Eletrônico - ebdi</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        /* Aplicação Completa do Manual de Marca EBDI */
        :root {
            --ebdi-bg: #161616;         /* Escuro Principal */
            --ebdi-blue: #003153;       /* Azul Escuro */
            --ebdi-lightblue: #1BA0CD;  /* Azul Claro */
            --ebdi-cyan: #00E4FF;       /* Ciano */
            --ebdi-gold: #D3B574;       /* Ouro */
            --ebdi-white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--ebdi-bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: var(--ebdi-white);
            overflow: hidden; /* Trava rolagem no tablet */
            padding: 20px;
        }

        .totem-card { 
            background: linear-gradient(135deg, var(--ebdi-blue) 0%, #001f35 100%);
            padding: 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            text-align: center; 
            width: 100%; 
            max-width: 500px; /* Largura ideal para tablets em pé ou deitados */
            height: auto;
            max-height: 90vh;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top: 6px solid var(--ebdi-cyan);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .logo-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-ebdi {
            max-height: 100%;
            max-width: 220px; 
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0,228,255,0.2));
        }

        /* Texto substituto caso não ache a imagem da logo */
        .logo-fallback {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--ebdi-white);
        }
        .logo-fallback span { color: var(--ebdi-cyan); }

        .status { 
            color: var(--ebdi-gold); 
            margin-bottom: 20px; 
            font-weight: 600; 
            font-size: 1.15rem;
            min-height: 28px; /* Evita que o layout dance quando o texto muda */
            letter-spacing: 0.5px;
        }

        /* MUDANÇA: CONTAINER DA CÂMERA COMPACTO E QUADRADO */
        .video-container { 
            position: relative; 
            width: 320px; 
            height: 320px; /* Força proporção idêntica de altura */
            margin: 0 auto 20px auto; 
            border-radius: 24px; /* Bordas arredondadas elegantes */
            overflow: hidden; 
            background: #000;
            border: 4px solid var(--ebdi-lightblue);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Recorta as sobras da webcam para virar quadrado perfeito */
            display: block; 
            transform: scaleX(-1); 
        }
        
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%;
            height: 100%;
            transform: scaleX(-1); 
        }
        
        .log-container { 
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 12px 15px;
            max-height: 140px; 
            overflow-y: auto; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            text-align: left; 
            font-size: 0.95rem; 
        }

        .log-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ebdi-lightblue);
            margin-bottom: 8px;
            display: block;
            font-weight: 700;
        }

        .log-item { 
            padding: 8px 0; 
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08); 
        }
        .log-item:last-child { border-bottom: none; }

        .entrada { color: #4ade80; font-weight: 600; } 
        .saida { color: #facc15; font-weight: 600; } 

        /* FAIXA VERDE DE SUCESSO DO TOP_DOWN */
        .success-banner {
            position: absolute;
            top: -100px; 
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #166534 0%, #15803d 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            width: 90%;
            border: 2px solid #22c55e;
        }

        .success-banner.show {
            top: 25px;
            opacity: 1;
            visibility: visible;
        }

        .success-banner .b-tipo { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; color: #bbf7d0; }
        .success-banner .b-nome { font-size: 1.6rem; font-weight: 700; margin: 6px 0; display: block; color: var(--ebdi-white); }
        .success-banner .b-data { font-size: 0.95rem; font-weight: 400; color: #e2e8f0; }

    </style>
</head>
<body>

<div id="successBanner" class="success-banner">
    <div id="bannerTipo" class="b-tipo">✅ Entrada Registrada</div>
    <span class="b-nome" id="bannerNome">Nome do Colaborador</span>
    <div class="b-data" id="bannerData">00/00/0000 às 00:00:00</div>
</div>

<div class="totem-card">
    <div class="logo-container">
        <img src="./logo.png" alt="EBDI" class="logo-ebdi" id="logoImg" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
        <div id="logoFallback" class="logo-fallback" style="display: none;">ebdi<span>.</span></div>
    </div>
    
    <div class="status" id="statusLabel">Carregando inteligência artificial...</div>
    
    <div class="video-container">
        <video id="video" autoplay muted playsinline></video>
    </div>
    
    <div class="log-container">
        <span class="log-title">Últimos Registros da Unidade</span>
        <div id="logContainer"></div>
    </div>
</div>

<script>
    window.onload = async function() {
        const video = document.getElementById('video');
        const statusLabel = document.getElementById('statusLabel');
        const logContainer = document.getElementById('logContainer');
        const successBanner = document.getElementById('successBanner');

        const modelUrl = 'https://justadudewhohacks.github.io/face-api.js/models';

        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl),
                faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl),
                faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl),
                faceapi.nets.ssdMobilenetv1.loadFromUri(modelUrl)
            ]);
            statusLabel.innerText = "Sincronizando banco facial...";
            
            // Configuração da foto de teste
            const labels = [
                'lazaroguylherme',
                'azeite',
                'clebersilva',
                'kaiquelima',
                'tiagosimoes',
                'vitorialela'
            ];
            
            const labeledFaceDescriptors = await Promise.all(
                labels.map(async label => {
                    const imgUrl = `./${label}.jpg`; 
                    try {
                        const img = await faceapi.fetchImage(imgUrl);
                        const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if (!detections) throw new Error();
                        return new faceapi.LabeledFaceDescriptors(label, [detections.descriptor]);
                    } catch (e) {
                        throw new Error(`Erro ao ler arquivo da foto: ./${label}.jpg`);
                    }
                })
            );

            const faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
            startVideo(faceMatcher);

        } catch (err) {
            statusLabel.innerText = err.message;
            statusLabel.style.color = "#ef4444";
        }

        function startVideo(faceMatcher) {
            statusLabel.innerText = "Iniciando câmera do totem...";
            statusLabel.style.color = "var(--ebdi-gold)";
            
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
                .then(stream => {
                    video.srcObject = stream;
                    statusLabel.innerText = "Posicione o rosto em frente ao tablet";
                    statusLabel.style.color = "var(--ebdi-cyan)";
                })
                .catch(err => {
                    statusLabel.innerText = "Acesso à câmera bloqueado!";
                    statusLabel.style.color = "#ef4444";
                });

            let pondoEmEspera = false;

            video.addEventListener('play', () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                document.querySelector('.video-container').append(canvas);
                
                // Vincula o canvas ao tamanho exato quadrado do container
                const displaySize = { width: video.clientWidth, height: video.clientHeight };
                faceapi.matchDimensions(canvas, displaySize);

                setInterval(async () => {
                    if (pondoEmEspera) return; 

                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);
                    
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                    faceapi.draw.drawDetections(canvas, resizedDetections);

                    if (detections.length > 0) {
                        const results = resizedDetections.map(d => faceMatcher.findBestMatch(d.descriptor));
                        
                        results.forEach((result) => {
                            const nomeReconhecido = result.label;
                            if (nomeReconhecido !== 'unknown') {
                                registrarPonto(nomeReconhecido);
                                pondoEmEspera = true;
                                setTimeout(() => { pondoEmEspera = false; }, 7000); // Cooldown ajustado para 7s
                            }
                        });
                    }
                }, 1000);
            });
        }

        function registrarPonto(nome) {
            const agora = new Date();
            const dataHoje = agora.toLocaleDateString('pt-BR'); 
            const horaFormatada = agora.toLocaleTimeString('pt-BR');
            
            const chaveRegistro = `ponto_${nome}_${dataHoje}`;
            const registroHoje = localStorage.getItem(chaveRegistro);
            let tipoPonto = "";

            if (!registroHoje) {
                tipoPonto = "Entrada";
                localStorage.setItem(chaveRegistro, 'entrada_registrada'); 
            } else {
                tipoPonto = "Saída";
            }
            
            // Atualiza a faixa suspensa verde
            document.getElementById('bannerTipo').innerHTML = tipoPonto === "Entrada" ? "✅ Entrada Registrada" : "👋 Saída Registrada";
            
            let nomeExibicao = nome;
            if (nome === 'lazaroguylherme') nomeExibicao = 'Lázaro Guylherme';
            if (nome === 'azeite') nomeExibicao = 'Azeite';
            if (nome === 'clebersilva') nomeExibicao = 'Cleber Silva';
            if (nome === 'kaiquelima') nomeExibicao = 'Kaique Lima';
            if (nome === 'tiagosimoes') nomeExibicao = 'Tiago Simões';
            if (nome === 'vitorialela') nomeExibicao = 'Vitória Lela';
            
            document.getElementById('bannerNome').innerText = nomeExibicao;
            document.getElementById('bannerData').innerText = `${dataHoje} às ${horaFormatada}`;
            
            // Animação da faixa descendo
            successBanner.classList.add('show');
            statusLabel.style.opacity = '0'; 

            // Insere na lista interna do totem
            const item = document.createElement('div');
            item.classList.add('log-item');
            const classeCor = tipoPonto === "Entrada" ? "entrada" : "saida";
            item.innerHTML = `<span class="${classeCor}"><strong>[${tipoPonto}]</strong> ${nomeExibicao} — ${horaFormatada}</span>`;
            logContainer.insertBefore(item, logContainer.firstChild);

            // Esconde a faixa após 4 segundos
            setTimeout(() => {
                successBanner.classList.remove('show');
                statusLabel.style.opacity = '1';
            }, 4000);
        }
    };
</script>
</body>
</html>
